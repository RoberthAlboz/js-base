<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercício 11a: Temporizador</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    #timer {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #007bff;
      color: white;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <!-- Temporizador -->
  <div id="timer">0</div>

  <!-- Botões de controle -->
  <button id="startButton">Iniciar</button>
  <button id="pauseButton">Pausar</button>
  <button id="resetButton">Resetar</button>

  <!-- Script JavaScript embutido na página -->
  <script>


    // 1ª Digitação (Resolva aqui o exercício)
    const startButton = document.querySelector('#startButton'); //Declarado variáveis
    const pauseButton = document.querySelector('#pauseButton');
    const resetButton = document.querySelector('#resetButton');
    
    let value = 0;                 //Declarado variáveis
    let intervalo = null;


    // 1. BOTÃO DE START
    startButton.addEventListener('click', () => {  // Evento de escuta
    intervalo = setInterval(() => { // Um intervalo de tempo para executar o bloco de código
        value += 1;                 // Igual o primeiro contador, ele adiciona +1
        timer.textContent = value;  // Mostra na tela o +1 atualizando a contagem 
    }, 1000);                       // O compasso entre cada segundo adicional
    
    })

    // 2. O BOTÃO PAUSE
    pauseButton.addEventListener('click', () => {
    // O clearInterval "desliga" o motor 
    clearInterval(intervalo);
    });

    // 3. O BOTÃO RESET
    resetButton.addEventListener('click', () => {
    clearInterval(intervalo); // Para o timer se estiver rodando
    value = 0;                // Zera o dado na memória
    timer.textContent = value; // Zera o visual na tela
    });
  </script>

</body>
</html>
